<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 260" width="680" height="260">
  <style>
    text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #e0e0e0; }
    .label { font-size: 13px; fill: #aaa; }
    .title { font-size: 14px; font-weight: bold; fill: #fff; }
    .dim { font-size: 11px; fill: #666; }
  </style>

  <!-- Background -->
  <rect width="680" height="260" rx="8" fill="#16213e"/>

  <!-- 2 Sections example -->
  <text x="100" y="24" text-anchor="middle" class="title">2 Sections</text>

  <!-- Source image outline -->
  <rect x="20" y="35" width="160" height="200" rx="4" fill="#111" stroke="#444" stroke-width="1"/>
  <text x="100" y="54" text-anchor="middle" class="dim">Source Image</text>

  <!-- Section strips -->
  <rect x="35" y="60" width="60" height="165" rx="2" fill="none" stroke="#537ec5" stroke-width="2" stroke-dasharray="4,2"/>
  <rect x="105" y="60" width="60" height="165" rx="2" fill="none" stroke="#e8845c" stroke-width="2" stroke-dasharray="4,2"/>

  <!-- Labels inside -->
  <text x="65" y="148" text-anchor="middle" class="label" fill="#537ec5">S1</text>
  <text x="135" y="148" text-anchor="middle" class="label" fill="#e8845c">S2</text>

  <!-- Arrow -->
  <path d="M 195 135 L 220 135" stroke="#666" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Output quilts for 2 sections -->
  <rect x="230" y="55" width="80" height="100" rx="3" fill="#1a1a2e" stroke="#537ec5" stroke-width="2"/>
  <text x="270" y="108" text-anchor="middle" class="dim" fill="#537ec5">Quilt 1</text>
  <!-- Grid lines -->
  <line x1="257" y1="55" x2="257" y2="155" stroke="#333" stroke-width="0.5"/>
  <line x1="284" y1="55" x2="284" y2="155" stroke="#333" stroke-width="0.5"/>
  <line x1="230" y1="80" x2="310" y2="80" stroke="#333" stroke-width="0.5"/>
  <line x1="230" y1="105" x2="310" y2="105" stroke="#333" stroke-width="0.5"/>
  <line x1="230" y1="130" x2="310" y2="130" stroke="#333" stroke-width="0.5"/>

  <rect x="230" y="165" width="80" height="100" rx="3" fill="#1a1a2e" stroke="#e8845c" stroke-width="2"/>
  <text x="270" y="218" text-anchor="middle" class="dim" fill="#e8845c">Quilt 2</text>
  <line x1="257" y1="165" x2="257" y2="265" stroke="#333" stroke-width="0.5"/>
  <line x1="284" y1="165" x2="284" y2="265" stroke="#333" stroke-width="0.5"/>
  <line x1="230" y1="190" x2="310" y2="190" stroke="#333" stroke-width="0.5"/>
  <line x1="230" y1="215" x2="310" y2="215" stroke="#333" stroke-width="0.5"/>
  <line x1="230" y1="240" x2="310" y2="240" stroke="#333" stroke-width="0.5"/>

  <!-- 3 Sections example -->
  <text x="490" y="24" text-anchor="middle" class="title">3 Sections</text>

  <!-- Source image outline -->
  <rect x="400" y="35" width="180" height="200" rx="4" fill="#111" stroke="#444" stroke-width="1"/>
  <text x="490" y="54" text-anchor="middle" class="dim">Source Image</text>

  <!-- Section strips -->
  <rect x="415" y="60" width="48" height="165" rx="2" fill="none" stroke="#537ec5" stroke-width="2" stroke-dasharray="4,2"/>
  <rect x="468" y="60" width="48" height="165" rx="2" fill="none" stroke="#e8845c" stroke-width="2" stroke-dasharray="4,2"/>
  <rect x="521" y="60" width="48" height="165" rx="2" fill="none" stroke="#7ec850" stroke-width="2" stroke-dasharray="4,2"/>

  <!-- Labels inside -->
  <text x="439" y="148" text-anchor="middle" class="label" fill="#537ec5">S1</text>
  <text x="492" y="148" text-anchor="middle" class="label" fill="#e8845c">S2</text>
  <text x="545" y="148" text-anchor="middle" class="label" fill="#7ec850">S3</text>

  <!-- Arrow -->
  <path d="M 590 135 L 615 135" stroke="#666" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Output quilts for 3 sections (smaller) -->
  <rect x="622" y="35" width="50" height="62" rx="2" fill="#1a1a2e" stroke="#537ec5" stroke-width="1.5"/>
  <text x="647" y="70" text-anchor="middle" class="dim" fill="#537ec5">Q1</text>

  <rect x="622" y="105" width="50" height="62" rx="2" fill="#1a1a2e" stroke="#e8845c" stroke-width="1.5"/>
  <text x="647" y="140" text-anchor="middle" class="dim" fill="#e8845c">Q2</text>

  <rect x="622" y="175" width="50" height="62" rx="2" fill="#1a1a2e" stroke="#7ec850" stroke-width="1.5"/>
  <text x="647" y="210" text-anchor="middle" class="dim" fill="#7ec850">Q3</text>

  <!-- Arrow marker -->
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#666"/>
    </marker>
  </defs>
</svg>
